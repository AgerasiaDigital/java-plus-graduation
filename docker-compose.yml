services:

  discovery-server:
    build: infra/discovery-server
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    build: infra/config-server
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-server:
    build: infra/gateway-server
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - "kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic stats.user-actions.v1 --partitions 3 --replication-factor 1 && kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic stats.events-similarity.v1 --partitions 3 --replication-factor 1"
    restart: "no"

  stats-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: statsuser
      POSTGRES_PASSWORD: statspass
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U statsuser -d stats" ]
      interval: 5s
      timeout: 5s
      retries: 5

  collector:
    build: stat/collector
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka
      - GRPC_SERVER_PORT=9101
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  aggregator:
    build: stat/aggregator
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  analyzer:
    build: stat/analyzer
    depends_on:
      discovery-server:
        condition: service_healthy
      stats-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka
      - GRPC_SERVER_PORT=9102
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  ewm-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm
      POSTGRES_USER: ewmuser
      POSTGRES_PASSWORD: ewmpass
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ewmuser -d ewm" ]
      interval: 5s
      timeout: 5s
      retries: 5

  users-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: usersuser
      POSTGRES_PASSWORD: userspass
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U usersuser -d users" ]
      interval: 5s
      timeout: 5s
      retries: 5

  requests-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: requests
      POSTGRES_USER: requser
      POSTGRES_PASSWORD: reqpass
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U requser -d requests" ]
      interval: 5s
      timeout: 5s
      retries: 5

  compilations-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: compilations
      POSTGRES_USER: compuser
      POSTGRES_PASSWORD: comppass
    ports:
      - "5436:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U compuser -d compilations" ]
      interval: 5s
      timeout: 5s
      retries: 5

  event-service:
    build: core/event-service
    depends_on:
      ewm-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      collector:
        condition: service_started
      analyzer:
        condition: service_started
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka

  user-service:
    build: core/user-service
    depends_on:
      users-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka

  request-service:
    build: core/request-service
    depends_on:
      requests-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      collector:
        condition: service_started
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka

  compilation-service:
    build: core/compilation-service
    depends_on:
      compilations-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka
