services:

  kafka:
    image: bitnami/kafka:3.7
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: bitnami/kafka:3.7
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c",
      "kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic stats.user-actions.v1 --replication-factor 1 --partitions 1 && kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic stats.events-similarity.v1 --replication-factor 1 --partitions 1"]
    restart: "no"

  analyzer-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: analyzer
      POSTGRES_USER: analyzeruser
      POSTGRES_PASSWORD: analyzerpass
    ports:
      - "5437:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U analyzeruser -d analyzer" ]
      interval: 5s
      timeout: 5s
      retries: 5

  discovery-server:
    build: infra/discovery-server
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    build: infra/config-server
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-server:
    build: infra/gateway-server
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka

  stats-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: statsuser
      POSTGRES_PASSWORD: statspass
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U statsuser -d stats" ]
      interval: 5s
      timeout: 5s
      retries: 5

  stats-server:
    build: stat/stat-server
    ports:
      - "9090:9090"
    depends_on:
      stats-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka

  ewm-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm
      POSTGRES_USER: ewmuser
      POSTGRES_PASSWORD: ewmpass
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ewmuser -d ewm" ]
      interval: 5s
      timeout: 5s
      retries: 5

  users-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: usersuser
      POSTGRES_PASSWORD: userspass
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U usersuser -d users" ]
      interval: 5s
      timeout: 5s
      retries: 5

  requests-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: requests
      POSTGRES_USER: requser
      POSTGRES_PASSWORD: reqpass
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U requser -d requests" ]
      interval: 5s
      timeout: 5s
      retries: 5

  compilations-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: compilations
      POSTGRES_USER: compuser
      POSTGRES_PASSWORD: comppass
    ports:
      - "5436:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U compuser -d compilations" ]
      interval: 5s
      timeout: 5s
      retries: 5

  event-service:
    build: core/event-service
    depends_on:
      ewm-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka

  user-service:
    build: core/user-service
    depends_on:
      users-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka

  request-service:
    build: core/request-service
    depends_on:
      requests-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka

  compilation-service:
    build: core/compilation-service
    depends_on:
      compilations-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka

  collector:
    build: stat/collector
    depends_on:
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka

  aggregator:
    build: stat/aggregator
    depends_on:
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka

  analyzer:
    build: stat/analyzer
    depends_on:
      analyzer-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka
