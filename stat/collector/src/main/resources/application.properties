spring.application.name=collector
spring.config.import=optional:configserver:http://localhost:8888

server.port=0

grpc.server.port=${GRPC_SERVER_PORT:9191}
eureka.instance.metadata-map.grpc.port=${GRPC_SERVER_PORT:9191}
eureka.instance.metadata-map.grpcPort=${GRPC_SERVER_PORT:9191}
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

spring.kafka.bootstrap-servers=${KAFKA_URL:localhost:9092}
spring.kafka.admin.fail-fast=false
spring.kafka.admin.properties[request.timeout.ms]=3000
spring.kafka.admin.properties[default.api.timeout.ms]=3000
spring.kafka.producer.properties[max.block.ms]=3000
spring.kafka.producer.properties[request.timeout.ms]=3000
spring.kafka.producer.properties[delivery.timeout.ms]=5000

ewm.kafka.topic.user-actions=stats.user-actions.v1
