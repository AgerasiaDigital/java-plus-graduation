server.port=8080

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Запросы к заявкам (должны быть ВЫШЕ routes для events, т.к. более специфичны)
spring.cloud.gateway.routes[0].id=request-service-event-requests
spring.cloud.gateway.routes[0].uri=lb://request-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/*/events/*/requests,/users/*/events/*/requests/**

spring.cloud.gateway.routes[1].id=request-service-user-requests
spring.cloud.gateway.routes[1].uri=lb://request-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/*/requests,/users/*/requests/**

# Запросы к событиям
spring.cloud.gateway.routes[2].id=event-service-users
spring.cloud.gateway.routes[2].uri=lb://event-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/users/*/events,/users/*/events/**

spring.cloud.gateway.routes[3].id=event-service-admin-events
spring.cloud.gateway.routes[3].uri=lb://event-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/admin/events,/admin/events/**

spring.cloud.gateway.routes[4].id=event-service-public
spring.cloud.gateway.routes[4].uri=lb://event-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/events,/events/**

spring.cloud.gateway.routes[5].id=event-service-categories-admin
spring.cloud.gateway.routes[5].uri=lb://event-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/admin/categories,/admin/categories/**

spring.cloud.gateway.routes[6].id=event-service-categories
spring.cloud.gateway.routes[6].uri=lb://event-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/categories,/categories/**

# Подборки
spring.cloud.gateway.routes[7].id=compilation-service-admin
spring.cloud.gateway.routes[7].uri=lb://compilation-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/admin/compilations,/admin/compilations/**

spring.cloud.gateway.routes[8].id=compilation-service-public
spring.cloud.gateway.routes[8].uri=lb://compilation-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/compilations,/compilations/**

# Пользователи (admin)
spring.cloud.gateway.routes[9].id=user-service-admin
spring.cloud.gateway.routes[9].uri=lb://user-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/admin/users,/admin/users/**
