server.port=8080

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.routes[0].id=requests-service
spring.cloud.gateway.routes[0].uri=lb://requests-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**/requests,/users/**/requests/**,/users/**/events/**/requests

spring.cloud.gateway.routes[1].id=events-service
spring.cloud.gateway.routes[1].uri=lb://events-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/admin/events/**,/users/**/events/**,/events/**

spring.cloud.gateway.routes[2].id=users-admin-service
spring.cloud.gateway.routes[2].uri=lb://users-admin-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/admin/users/**

spring.cloud.gateway.routes[3].id=additional-service
spring.cloud.gateway.routes[3].uri=lb://additional-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/categories/**,/admin/categories/**,/compilations/**,/admin/compilations/**
