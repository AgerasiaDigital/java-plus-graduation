server.port=8080

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/admin/users/**

spring.cloud.gateway.routes[1].id=category-service
spring.cloud.gateway.routes[1].uri=lb://category-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/admin/categories/**,/categories/**

spring.cloud.gateway.routes[2].id=compilation-service
spring.cloud.gateway.routes[2].uri=lb://compilation-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/admin/compilations/**,/compilations/**

spring.cloud.gateway.routes[3].id=request-service
spring.cloud.gateway.routes[3].uri=lb://request-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/users/*/requests/**,/users/*/events/*/requests/**

spring.cloud.gateway.routes[4].id=event-service
spring.cloud.gateway.routes[4].uri=lb://event-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/admin/events/**,/events/**,/users/*/events/**

spring.cloud.gateway.routes[5].id=main-service
spring.cloud.gateway.routes[5].uri=lb://main-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/admin/**,/users/**,/categories/**,/compilations/**,/events/**
