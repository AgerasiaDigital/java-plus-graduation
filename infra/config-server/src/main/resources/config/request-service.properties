server.port=0
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5435/requests
spring.datasource.username=requser
spring.datasource.password=reqpass
spring.sql.init.mode=always
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.openfeign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
grpc.client.collector.address=discovery:///collector
grpc.client.collector.enable-keep-alive=true
grpc.client.collector.keep-alive-without-calls=true
grpc.client.collector.negotiation-type=plaintext
