spring.application.name=analyzer
server.port=0

grpc.server.port=${GRPC_SERVER_PORT:9192}
eureka.instance.metadata-map.grpc.port=${GRPC_SERVER_PORT:9192}
eureka.instance.metadata-map.grpcPort=${GRPC_SERVER_PORT:9192}
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/analyzer
spring.datasource.username=analyzeruser
spring.datasource.password=analyzerpass
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.kafka.bootstrap-servers=${KAFKA_URL:localhost:29092}
spring.kafka.admin.fail-fast=false
spring.kafka.admin.properties.request.timeout.ms=3000
spring.kafka.admin.properties.default.api.timeout.ms=3000
spring.kafka.consumer.auto-offset-reset=earliest

ewm.kafka.topic.user-actions=stats.user-actions.v1
ewm.kafka.topic.events-similarity=stats.events-similarity.v1
ewm.kafka.consumer.user-actions-group=analyzer-user-actions
ewm.kafka.consumer.similarity-group=analyzer-similarity

ewm.recommendations.recent-interactions-limit=10
ewm.recommendations.nearest-neighbors-k=5
ewm.recommendations.default-max-results=10
