server.port=0
grpc.server.port=0
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://analyzer-db:5432/analyzer
spring.datasource.username=analyzeruser
spring.datasource.password=analyzerpass
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=analyzer-group
kafka.topics.user-actions=stats.user-actions.v1
kafka.topics.event-similarity=stats.events-similarity.v1
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
