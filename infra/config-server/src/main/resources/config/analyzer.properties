spring.application.name=analyzer
server.port=0

grpc.server.port=${GRPC_SERVER_PORT:0}
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=5

spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/stats
spring.datasource.username=statsuser
spring.datasource.password=statspass
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.fail-fast=false
spring.kafka.consumer.auto-offset-reset=earliest

ewm.kafka.topic.user-actions=stats.user-actions.v1
ewm.kafka.topic.events-similarity=stats.events-similarity.v1
ewm.kafka.consumer.user-actions-group=analyzer-user-actions
ewm.kafka.consumer.similarity-group=analyzer-similarity

ewm.recommendations.recent-interactions-limit=10
ewm.recommendations.nearest-neighbors-k=5
ewm.recommendations.default-max-results=10
