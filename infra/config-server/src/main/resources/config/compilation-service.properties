server.port=0
logging.level.root=INFO

spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5438/ewm-compilation
spring.datasource.username=ewmuser
spring.datasource.password=ewmpass
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

resilience4j.circuitbreaker.instances.event-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.event-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.event-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.event-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.event-service.permitted-number-of-calls-in-half-open-state=3

resilience4j.retry.instances.event-service.max-attempts=3
resilience4j.retry.instances.event-service.wait-duration=1s
